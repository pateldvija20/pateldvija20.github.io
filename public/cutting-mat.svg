<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1116 862" width="1116" height="862">
  <defs>
    <!-- Minor grid: 10px cells -->
    <pattern id="minor" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#E5E55A" stroke-width="0.25" opacity="0.35"/>
    </pattern>
    <!-- Major grid: 50px cells -->
    <pattern id="major" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="url(#minor)"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#E5E55A" stroke-width="0.6" opacity="0.65"/>
    </pattern>
    <!-- Super grid: 100px cells with bolder lines -->
    <pattern id="super" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#major)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#E5E55A" stroke-width="1" opacity="0.85"/>
    </pattern>
  </defs>

  <!-- Mat background -->
  <rect width="1116" height="862" fill="#00332A"/>

  <!-- Grid layers -->
  <rect width="1116" height="862" fill="url(#super)"/>

  <!-- Diagonal cut guides — subtle 45° lines for a real cutting mat feel -->
  <g stroke="#E5E55A" stroke-width="0.4" opacity="0.18">
    <line x1="0"    y1="0"   x2="862"  y2="862"/>
    <line x1="100"  y1="0"   x2="962"  y2="862"/>
    <line x1="200"  y1="0"   x2="1062" y2="862"/>
    <line x1="300"  y1="0"   x2="1116" y2="816"/>
    <line x1="0"    y1="100" x2="762"  y2="862"/>
    <line x1="0"    y1="200" x2="662"  y2="862"/>
    <line x1="0"    y1="300" x2="562"  y2="862"/>
    <line x1="0"    y1="400" x2="462"  y2="862"/>
    <line x1="0"    y1="500" x2="362"  y2="862"/>
    <line x1="0"    y1="600" x2="262"  y2="862"/>
    <line x1="0"    y1="700" x2="162"  y2="862"/>
    <line x1="0"    y1="800" x2="62"   y2="862"/>
  </g>

  <!-- Ruler tick marks — top edge -->
  <g stroke="#E5E55A" stroke-width="0.8" opacity="0.55">
    <line x1="0"   y1="0"  x2="0"   y2="12"/>
    <line x1="50"  y1="0"  x2="50"  y2="8"/>
    <line x1="100" y1="0"  x2="100" y2="12"/>
    <line x1="150" y1="0"  x2="150" y2="8"/>
    <line x1="200" y1="0"  x2="200" y2="12"/>
    <line x1="250" y1="0"  x2="250" y2="8"/>
    <line x1="300" y1="0"  x2="300" y2="12"/>
    <line x1="350" y1="0"  x2="350" y2="8"/>
    <line x1="400" y1="0"  x2="400" y2="12"/>
    <line x1="450" y1="0"  x2="450" y2="8"/>
    <line x1="500" y1="0"  x2="500" y2="12"/>
    <line x1="550" y1="0"  x2="550" y2="8"/>
    <line x1="600" y1="0"  x2="600" y2="12"/>
    <line x1="650" y1="0"  x2="650" y2="8"/>
    <line x1="700" y1="0"  x2="700" y2="12"/>
    <line x1="750" y1="0"  x2="750" y2="8"/>
    <line x1="800" y1="0"  x2="800" y2="12"/>
    <line x1="850" y1="0"  x2="850" y2="8"/>
    <line x1="900" y1="0"  x2="900" y2="12"/>
    <line x1="950" y1="0"  x2="950" y2="8"/>
    <line x1="1000" y1="0" x2="1000" y2="12"/>
    <line x1="1050" y1="0" x2="1050" y2="8"/>
    <line x1="1100" y1="0" x2="1100" y2="12"/>
  </g>

  <!-- Ruler tick marks — left edge -->
  <g stroke="#E5E55A" stroke-width="0.8" opacity="0.55">
    <line x1="0" y1="0"   x2="12" y2="0"/>
    <line x1="0" y1="50"  x2="8"  y2="50"/>
    <line x1="0" y1="100" x2="12" y2="100"/>
    <line x1="0" y1="150" x2="8"  y2="150"/>
    <line x1="0" y1="200" x2="12" y2="200"/>
    <line x1="0" y1="250" x2="8"  y2="250"/>
    <line x1="0" y1="300" x2="12" y2="300"/>
    <line x1="0" y1="350" x2="8"  y2="350"/>
    <line x1="0" y1="400" x2="12" y2="400"/>
    <line x1="0" y1="450" x2="8"  y2="450"/>
    <line x1="0" y1="500" x2="12" y2="500"/>
    <line x1="0" y1="550" x2="8"  y2="550"/>
    <line x1="0" y1="600" x2="12" y2="600"/>
    <line x1="0" y1="650" x2="8"  y2="650"/>
    <line x1="0" y1="700" x2="12" y2="700"/>
    <line x1="0" y1="750" x2="8"  y2="750"/>
    <line x1="0" y1="800" x2="12" y2="800"/>
    <line x1="0" y1="850" x2="8"  y2="850"/>
  </g>
</svg>
